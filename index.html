<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baginda Royale Phone v7</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
    <style>
      :root {
        --royal-navy: #0f172a;
        --royal-navy-light: #1e293b;
        --royal-gold: #c5a059;
        --royal-gold-dark: #b08d4a;
        --ivory: #fdfcf0;
        --soft-white: #ffffff;
        --danger: #991b1b;
        --success: #166534;
        --light-gray: #f1f5f9;
      }

      * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
      body { background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
      
      .phone-container { background: var(--ivory); width: 420px; height: 820px; border-radius: 45px; box-shadow: 0 40px 120px rgba(0,0,0,0.7); border: 12px solid #1a1a1a; position: relative; overflow: hidden; display: flex; flex-direction: column; transition: transform 0.5s ease; }

      .screen { display: none; flex-direction: column; height: 100%; opacity: 0; transition: 0.4s ease; }
      .screen.active { display: flex; opacity: 1; }

      /* --- Login --- */
      #loginScreen { padding: 80px 45px; background: linear-gradient(135deg, var(--ivory) 0%, #f7f6e0 100%); }
      .royal-crest { text-align: center; margin-bottom: 30px; font-size: 70px; color: var(--royal-gold); }
      h2 { font-family: 'Playfair Display', serif; text-align: center; color: var(--royal-navy); font-size: 38px; margin-bottom: 40px; font-weight: 800; }
      .input-group { margin-bottom: 25px; }
      .input-group label { font-size: 11px; font-weight: 800; color: var(--royal-gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; display: block; }
      .input-group input { width: 100%; padding: 14px 0; border: none; border-bottom: 2px solid #e2e8f0; background: transparent; font-size: 17px; outline: none; color: var(--royal-navy); }
      .btn-authenticate { background: var(--royal-navy); color: var(--royal-gold); border: 1px solid var(--royal-gold); padding: 20px; border-radius: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 4px; margin-top: 30px; transition: 0.4s; box-shadow: 0 10px 25px rgba(15, 23, 42, 0.3); }

      /* --- Header --- */
      .phone-header { padding: 25px 25px 15px 25px; background: var(--soft-white); display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid #f1f5f9; z-index: 10; }
      .header-title { font-family: 'Playfair Display', serif; color: var(--royal-navy); font-weight: 800; font-size: 24px; }
      .status-container { display: flex; align-items: center; gap: 6px; }
      .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; }
      .status-registered .status-dot { background: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.6); }
      .status-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }

      /* --- Content Area --- */
      .content-area { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; background: var(--soft-white); position: relative; }

      /* --- Dialpad Improved --- */
      #dialpadDisplay { height: 100px; font-size: 48px; display: flex; align-items: center; justify-content: center; color: var(--royal-navy); font-weight: 200; margin: 10px 0; letter-spacing: 2px; }
      .dialpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 0 45px; }
      .digit-btn { 
        height: 75px; width: 75px; margin: auto; border-radius: 50%; border: 1px solid #f1f5f9; 
        background: var(--light-gray); font-size: 28px; cursor: pointer; transition: 0.2s; 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.02); color: var(--royal-navy); font-weight: 500;
      }
      .digit-btn:active, .digit-btn.kbd-active { background: var(--royal-gold); color: white; transform: scale(0.92); }
      .digit-btn.kbd-active .digit-sub { color: white; }
      .digit-sub { font-size: 8px; font-weight: 800; color: var(--royal-gold); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }

      .call-actions { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 40px; }
      .btn-action-circle { width: 70px; height: 70px; border-radius: 50%; border: none; color: white; cursor: pointer; font-size: 24px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
      .btn-audio { background: var(--success); box-shadow: 0 10px 25px rgba(22, 101, 52, 0.3); }
      .btn-video { background: var(--royal-gold); box-shadow: 0 10px 25px rgba(197, 160, 89, 0.3); }
      .btn-delete { background: transparent; color: #94a3b8; font-size: 20px; width: 50px; height: 50px; }
      .btn-delete:hover { color: var(--danger); }

      /* --- Lists --- */
      .list-item { display: flex; align-items: center; padding: 18px 25px; border-bottom: 1px solid #f8fafc; cursor: pointer; }
      .avatar { width: 52px; height: 52px; color: white; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 22px; margin-right: 18px; }
      .item-info { flex-grow: 1; }
      .item-name { font-weight: 700; color: var(--royal-navy); font-size: 16px; }
      .item-sub { font-size: 12px; color: #64748b; }

      /* --- Chat Room --- */
      #chatRoomScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f0f2f5; z-index: 100; display: none; flex-direction: column; }
      #chatRoomScreen.active { display: flex; }
      .chat-header { padding: 15px 20px; background: var(--royal-navy); color: white; display: flex; align-items: center; gap: 15px; }
      .chat-messages { flex-grow: 1; padding: 25px 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
      .bubble { max-width: 80%; padding: 10px 16px; border-radius: 20px; font-size: 14px; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
      .bubble-in { align-self: flex-start; background: white; color: var(--royal-navy); border-top-left-radius: 4px; }
      .bubble-out { align-self: flex-end; background: #dcf8c6; color: var(--royal-navy); border-top-right-radius: 4px; }
      .bubble-time { font-size: 9px; color: #94a3b8; text-align: right; margin-top: 6px; display: block; font-weight: 700; }
      .chat-footer { padding: 15px 20px; background: #f0f2f5; display: flex; gap: 12px; align-items: center; }
      .chat-input { flex-grow: 1; border: none; border-radius: 30px; padding: 14px 22px; outline: none; font-size: 15px; background: white; }
      .btn-send { background: var(--royal-navy); color: var(--royal-gold); border: none; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

      /* --- Navigation --- */
      .phone-footer { height: 90px; background: white; border-top: 1px solid #f1f5f9; display: flex; justify-content: space-around; align-items: center; padding-bottom: 10px; }
      .nav-btn { background: none; border: none; color: #94a3b8; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: 0.4s; padding: 10px 20px; border-radius: 20px; }
      .nav-btn.active { color: var(--royal-gold); background: #fdfcf0; }
      .nav-icon { font-size: 24px; }
      .nav-label { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }

      /* --- Overlays & Modals --- */
      .call-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 500; }
      .call-overlay.active { display: flex; flex-direction: column; }
      .btn-hangup { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; border-radius: 50%; background: var(--danger); border: none; color: white; font-size: 36px; cursor: pointer; }
      .badge { position: absolute; top: 2px; right: 8px; background: var(--danger); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: none; align-items: center; justify-content: center; font-weight: 900; border: 3px solid white; }

      .icon { font-style: normal; }
    </style>
  </head>
  <body>
    <div class="phone-container">
      
      <!-- Login -->
      <div id="loginScreen" class="screen active">
        <div class="royal-crest">⚜</div>
        <h2>Royale Phone</h2>
        <div class="input-group"><label>Royal Identity</label><input type="text" id="username" value="031" spellcheck="false"></div>
        <div class="input-group"><label>Access Key</label><input type="password" id="password" value="12345a"></div>
        <div class="input-group"><label>Kingdom Domain</label><input type="text" id="domain" value="10.10.10.97" spellcheck="false"></div>
        <div class="input-group"><label>Gateway Port</label><input type="text" id="wsPort" value="8088"></div>
        <button id="btnLogin" class="btn-authenticate">Begin Session</button>
      </div>

      <!-- Main App -->
      <div id="mainScreen" class="screen">
        <div class="phone-header">
          <span class="header-title" id="headerTitle">Royale Dial</span>
          <div class="status-container" id="regStatusContainer">
            <div class="status-dot"></div>
            <span class="status-label" id="regStatus">Offline</span>
          </div>
        </div>

        <div class="content-area">
          
          <!-- Screen: Dialpad -->
          <div id="dialScreen" class="screen active">
            <div id="dialpadDisplay"></div>
            <div class="dialpad-grid">
              <button class="digit-btn" id="key-1" onclick="appendDial('1')">1<span class="digit-sub">&nbsp;</span></button>
              <button class="digit-btn" id="key-2" onclick="appendDial('2')">2<span class="digit-sub">ABC</span></button>
              <button class="digit-btn" id="key-3" onclick="appendDial('3')">3<span class="digit-sub">DEF</span></button>
              <button class="digit-btn" id="key-4" onclick="appendDial('4')">4<span class="digit-sub">GHI</span></button>
              <button class="digit-btn" id="key-5" onclick="appendDial('5')">5<span class="digit-sub">JKL</span></button>
              <button class="digit-btn" id="key-6" onclick="appendDial('6')">6<span class="digit-sub">MNO</span></button>
              <button class="digit-btn" id="key-7" onclick="appendDial('7')">7<span class="digit-sub">PQRS</span></button>
              <button class="digit-btn" id="key-8" onclick="appendDial('8')">8<span class="digit-sub">TUV</span></button>
              <button class="digit-btn" id="key-9" onclick="appendDial('9')">9<span class="digit-sub">WXYZ</span></button>
              <button class="digit-btn" id="key-star" onclick="appendDial('*')">*<span class="digit-sub">&nbsp;</span></button>
              <button class="digit-btn" id="key-0" onclick="appendDial('0')">0<span class="digit-sub">+</span></button>
              <button class="digit-btn" id="key-hash" onclick="appendDial('#')">#<span class="digit-sub">&nbsp;</span></button>
            </div>
            <div class="call-actions">
              <div style="width: 50px;"></div> <!-- Spacer -->
              <button id="btnCallAudio" class="btn-action-circle btn-audio">📞</button>
              <button id="btnCallVideo" class="btn-action-circle btn-video">📹</button>
              <button id="btnDelete" class="btn-action-circle btn-delete" onclick="backspaceDial()">⌫</button>
            </div>
          </div>

          <!-- Screen: Contacts -->
          <div id="contactsScreen" class="screen">
            <div id="contactList" style="flex-grow: 1; overflow-y: auto;"></div>
            <button style="position:absolute; bottom:30px; right:30px; width:60px; height:60px; border-radius:20px; background:var(--royal-navy); color:var(--royal-gold); border:2px solid var(--royal-gold); font-size:30px; cursor:pointer;" onclick="showAddContactModal()">+</button>
          </div>

          <!-- Screen: Chat History -->
          <div id="chatScreen" class="screen">
            <div id="chatList" style="flex-grow: 1; overflow-y: auto;"></div>
          </div>

          <!-- Chat Room -->
          <div id="chatRoomScreen">
            <div class="chat-header">
              <button style="background:none; border:none; color:var(--royal-gold); font-size:26px; cursor:pointer;" onclick="closeChatRoom()">←</button>
              <div class="item-info">
                <span class="item-name" id="chatRoomName" style="font-size: 18px; color: white;">Name</span>
                <span class="item-sub" id="chatRoomNumber" style="color: var(--royal-gold);">Number</span>
              </div>
            </div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-footer">
              <input type="text" id="chatInput" class="chat-input" placeholder="Type a royal message...">
              <button id="btnSendChat" class="btn-send">➤</button>
            </div>
          </div>
        </div>

        <!-- Footer Nav -->
        <div class="phone-footer">
          <button class="nav-btn active" id="navDial"><span class="nav-icon">📱</span><span class="nav-label">Dial</span></button>
          <button class="nav-btn" id="navContacts"><span class="nav-icon">👥</span><span class="nav-label">Contacts</span></button>
          <button class="nav-btn" id="navChat"><div style="position:relative;"><span class="nav-icon">✉</span><span id="chatBadge" class="badge">0</span></div><span class="nav-label">Chat</span></button>
        </div>
      </div>

      <!-- Add Contact Modal -->
      <div id="addContactModal" style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:1000;">
        <div style="background:white; width:85%; padding:30px; border-radius:30px;">
          <h3 style="font-family:'Playfair Display',serif; margin-top:0;">New Contact</h3>
          <div class="input-group"><label>Name</label><input type="text" id="contactName"></div>
          <div class="input-group"><label>Number</label><input type="text" id="contactNumber"></div>
          <div style="display:flex; flex-direction:column; gap:10px;">
            <button class="btn-authenticate" style="margin:0; padding:15px;" onclick="saveNewContact()">Save</button>
            <button style="background:none; border:none; color:#64748b; font-weight:700; cursor:pointer;" onclick="hideAddContactModal()">CANCEL</button>
          </div>
        </div>
      </div>

      <!-- Call Overlays -->
      <div id="callOverlay" class="call-overlay">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline style="width:100px; height:150px; position:absolute; bottom:120px; right:20px; border:2px solid var(--royal-gold); border-radius:10px; object-fit:cover;"></video>
        <div style="position:absolute; top:80px; width:100%; text-align:center; color:white;">
          <h3 id="overlayTarget" style="font-family:'Playfair Display',serif; font-size:40px; margin:0;">Target</h3>
          <div id="overlayStatus" style="font-size:12px; color:var(--royal-gold); letter-spacing:3px; margin-top:10px; font-weight:800;">Negotiating...</div>
          <div id="callTimer" style="font-size:20px; margin-top:20px; font-weight:300;">00:00</div>
        </div>
        <button id="btnHangup" class="btn-hangup">✖</button>
      </div>

      <!-- Incoming Call -->
      <div id="incomingModal" style="position:absolute; top:0; left:0; width:100%; height:100%; background:var(--royal-navy); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:1000; color:white;">
        <div style="color:var(--royal-gold); letter-spacing:5px; font-size:12px; margin-bottom:30px; font-weight:800;">INCOMING CALL</div>
        <div id="incomingCaller" style="font-family:'Playfair Display',serif; font-size:48px; margin-bottom:80px;">Unknown</div>
        <div style="display:flex; gap:60px;">
          <button id="btnReject" class="btn-authenticate" style="background:var(--danger); border:none; width:80px; height:80px; border-radius:50%; font-size:32px;">✖</button>
          <button id="btnAnswerAudio" class="btn-authenticate" style="background:var(--success); border:none; width:80px; height:80px; border-radius:50%; font-size:32px;">📞</button>
        </div>
      </div>

    </div>

    <audio id="remoteAudio" autoplay></audio>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.appendDial = (val) => {
        const d = document.getElementById('dialpadDisplay');
        if (d.innerText.length < 15) {
          d.innerText += val;
          const keyId = val === '*' ? 'star' : val === '#' ? 'hash' : val;
          const btn = document.getElementById(`key-${keyId}`);
          if (btn) {
            btn.classList.add('kbd-active');
            setTimeout(() => btn.classList.remove('kbd-active'), 100);
          }
        }
      };
      window.backspaceDial = () => {
        const d = document.getElementById('dialpadDisplay');
        d.innerText = d.innerText.slice(0, -1);
      };
    </script>
  </body>
</html>
