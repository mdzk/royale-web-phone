<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baginda Royale Phone v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
      :root {
        --royal-navy: #0f172a;
        --royal-gold: #c5a059;
        --ivory: #fdfcf0;
        --danger: #991b1b;
        --success: #166534;
        --shadow: 0 10px 25px rgba(0,0,0,0.1);
      }

      * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
      
      body { 
        background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
        color: var(--royal-navy);
      }
      
      .phone-container { 
        background: var(--ivory); 
        width: 400px; height: 750px; 
        border-radius: 40px; 
        box-shadow: 0 40px 100px rgba(0,0,0,0.6); 
        border: 12px solid #1a1a1a; 
        position: relative; overflow: hidden; display: flex; flex-direction: column;
      }

      /* --- Screens --- */
      .screen { display: none; flex-direction: column; height: 100%; animation: fadeIn 0.4s ease; }
      .screen.active { display: flex; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

      /* --- Login --- */
      #loginScreen { padding: 40px 30px; }
      h2 { font-family: 'Playfair Display', serif; text-align: center; color: var(--royal-navy); font-size: 32px; margin-bottom: 30px; }
      .input-group { margin-bottom: 20px; }
      .input-group label { font-size: 10px; font-weight: 700; color: var(--royal-gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; display: block; }
      .input-group input { width: 100%; padding: 10px 0; border: none; border-bottom: 2px solid #e2e8f0; background: transparent; font-size: 16px; outline: none; transition: 0.3s; }
      .input-group input:focus { border-bottom-color: var(--royal-gold); }
      .btn-primary { background: var(--royal-navy); color: var(--royal-gold); border: 1px solid var(--royal-gold); padding: 18px; border-radius: 8px; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; transition: 0.3s; margin-top: 20px; }
      .btn-primary:hover { background: var(--royal-gold); color: var(--royal-navy); }

      /* --- Content Layout --- */
      .content-area { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; padding: 20px; position: relative; }
      
      /* --- Navigation --- */
      .phone-footer { height: 70px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; }
      .nav-btn { background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px; }
      .nav-btn.active { color: var(--royal-gold); }
      .nav-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

      /* --- Header --- */
      .phone-header { padding: 15px 20px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
      .user-info { font-size: 11px; color: var(--royal-gold); font-weight: 600; }
      .status-pill { font-size: 8px; padding: 2px 8px; border-radius: 10px; border: 1px solid #ddd; color: #999; text-transform: uppercase; }
      .status-registered { border-color: var(--success); color: var(--success); }

      /* --- Dialpad --- */
      #dialpadDisplay { height: 60px; font-size: 36px; display: flex; align-items: center; justify-content: center; color: var(--royal-navy); font-weight: 300; margin: 10px 0; }
      .dialpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
      .digit-btn { height: 65px; width: 65px; margin: auto; border-radius: 50%; border: 1px solid transparent; background: white; font-size: 24px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
      .digit-btn:active, .digit-btn.kbd-active { background: var(--royal-gold); color: white; transform: scale(0.9); }
      .digit-sub { font-size: 7px; color: var(--royal-gold); font-weight: 600; }
      .call-actions { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
      .btn-circle { width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
      .btn-call-audio { background: var(--success); box-shadow: 0 8px 20px rgba(22, 101, 52, 0.3); }
      .btn-call-video { background: var(--royal-gold); box-shadow: 0 8px 20px rgba(197, 160, 89, 0.3); }

      /* --- Messages --- */
      #chatTarget { border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; width: 100%; margin-bottom: 10px; outline: none; }
      #messageList { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; padding-right: 5px; }
      .msg-bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 13px; line-height: 1.4; position: relative; }
      .msg-in { align-self: flex-start; background: #e2e8f0; color: #1e293b; border-bottom-left-radius: 2px; }
      .msg-out { align-self: flex-end; background: var(--royal-navy); color: var(--royal-gold); border-bottom-right-radius: 2px; }
      .msg-sender { font-size: 9px; font-weight: 700; color: var(--royal-gold); margin-bottom: 4px; display: block; }
      .chat-input-row { display: flex; gap: 10px; }
      #msgInput { flex-grow: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; font-size: 14px; outline: none; }
      .btn-send { background: var(--royal-navy); color: var(--royal-gold); border: 1px solid var(--royal-gold); width: 40px; height: 40px; border-radius: 50%; cursor: pointer; }

      /* --- Call Overlay (Video) --- */
      .call-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; z-index: 200; overflow: hidden; }
      .call-overlay.active { display: flex; }
      #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
      #localVideo { width: 100px; height: 150px; border-radius: 12px; border: 2px solid var(--royal-gold); position: absolute; bottom: 100px; right: 20px; object-fit: cover; background: #222; }
      .overlay-info { position: absolute; top: 40px; left: 0; width: 100%; text-align: center; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
      .overlay-info h3 { margin: 0; font-family: 'Playfair Display', serif; font-size: 28px; }
      .btn-hangup { background: var(--danger); position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; border-radius: 50%; border: none; color: white; font-size: 28px; cursor: pointer; z-index: 210; box-shadow: 0 10px 30px rgba(153, 27, 27, 0.5); }
      
      /* --- Incoming --- */
      .incoming-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 300; color: white; }
      .incoming-modal.active { display: flex; }
      .btn-inc { width: 70px; height: 70px; border-radius: 50%; border: none; color: white; cursor: pointer; font-size: 24px; transition: 0.3s; }
      .btn-ans { background: var(--success); }
      .btn-rej { background: var(--danger); }

      /* --- Conference --- */
      .group-banner { background: var(--royal-navy); color: var(--royal-gold); padding: 10px; border-radius: 8px; font-size: 11px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
      .btn-join { background: var(--royal-gold); color: var(--royal-navy); border: none; padding: 5px 12px; border-radius: 4px; font-size: 10px; cursor: pointer; font-weight: bold; }

      .icon { font-style: normal; }
    </style>
  </head>
  <body>
    <div class="phone-container">
      
      <!-- Screen: Login -->
      <div id="loginScreen" class="screen active">
        <div style="text-align: center; margin-bottom: 20px;"><span style="color: var(--royal-gold); font-size: 50px;">⚜</span></div>
        <h2>Royale Access</h2>
        <div class="input-group"><label>Royal Identity</label><input type="text" id="username" value="031" autofocus></div>
        <div class="input-group"><label>Access Key</label><input type="password" id="password" value="12345a"></div>
        <div class="input-group"><label>Domain</label><input type="text" id="domain" value="10.10.10.97"></div>
        <div class="input-group"><label>Gateway Port</label><input type="text" id="wsPort" value="8088"></div>
        <button id="btnLogin" class="btn-primary">Authenticate</button>
      </div>

      <!-- Screen: Main -->
      <div id="mainScreen" class="screen">
        <div class="phone-header">
          <div class="user-info" id="headerUser">031@DOMAIN</div>
          <div class="status-pill" id="regStatus">Offline</div>
        </div>

        <!-- Inner Screens -->
        <div class="content-area">
          
          <!-- Inner Screen: Dialpad -->
          <div id="dialScreen" class="screen active">
            <div class="group-banner">
              <span>Conference Hall</span>
              <button class="btn-join" onclick="joinConference()">JOIN ROOM</button>
            </div>

            <div id="dialpadDisplay"></div>
            <div class="dialpad-grid">
              <button class="digit-btn" id="key-1" onclick="appendDial('1')">1<span class="digit-sub">&nbsp;</span></button>
              <button class="digit-btn" id="key-2" onclick="appendDial('2')">2<span class="digit-sub">ABC</span></button>
              <button class="digit-btn" id="key-3" onclick="appendDial('3')">3<span class="digit-sub">DEF</span></button>
              <button class="digit-btn" id="key-4" onclick="appendDial('4')">4<span class="digit-sub">GHI</span></button>
              <button class="digit-btn" id="key-5" onclick="appendDial('5')">5<span class="digit-sub">JKL</span></button>
              <button class="digit-btn" id="key-6" onclick="appendDial('6')">6<span class="digit-sub">MNO</span></button>
              <button class="digit-btn" id="key-7" onclick="appendDial('7')">7<span class="digit-sub">PQRS</span></button>
              <button class="digit-btn" id="key-8" onclick="appendDial('8')">8<span class="digit-sub">TUV</span></button>
              <button class="digit-btn" id="key-9" onclick="appendDial('9')">9<span class="digit-sub">WXYZ</span></button>
              <button class="digit-btn" id="key-star" onclick="appendDial('*')">*<span class="digit-sub">&nbsp;</span></button>
              <button class="digit-btn" id="key-0" onclick="appendDial('0')">0<span class="digit-sub">+</span></button>
              <button class="digit-btn" id="key-hash" onclick="appendDial('#')">#<span class="digit-sub">&nbsp;</span></button>
            </div>
            <div class="call-actions">
              <button id="btnCallAudio" class="btn-circle btn-call-audio"><i class="icon">📞</i></button>
              <button id="btnCallVideo" class="btn-circle btn-call-video"><i class="icon">📹</i></button>
            </div>
          </div>

          <!-- Inner Screen: Messages -->
          <div id="chatScreen" class="screen">
            <input type="text" id="chatTarget" placeholder="Target Number / Group ID">
            <div id="messageList">
              <div style="text-align: center; color: #999; font-size: 10px; margin-top: 20px;">No messages yet</div>
            </div>
            <div class="chat-input-row">
              <input type="text" id="msgInput" placeholder="Write message...">
              <button id="btnSendMessage" class="btn-send"><i class="icon">➤</i></button>
            </div>
          </div>

        </div>

        <!-- Footer Navigation -->
        <div class="phone-footer">
          <button class="nav-btn active" id="navDial">
            <i class="icon">📱</i><span class="nav-label">Phone</span>
          </button>
          <button class="nav-btn" id="navChat">
            <i class="icon">✉</i><span class="nav-label">Chat</span>
          </button>
          <button class="nav-btn" id="btnLogoutNav">
            <i class="icon">🚪</i><span class="nav-label">Exit</span>
          </button>
        </div>
      </div>

      <!-- Overlay: Active Call -->
      <div id="callOverlay" class="call-overlay">
        <video id="remoteVideo" autoplay playsinline></video>
        <video id="localVideo" autoplay muted playsinline></video>
        <div class="overlay-info">
          <div id="overlayStatus" style="font-size: 11px; color: var(--royal-gold); letter-spacing: 2px;">In Call</div>
          <h3 id="overlayTarget">Unknown</h3>
          <div id="callTimer" style="font-size: 14px; margin-top: 10px;">00:00</div>
        </div>
        <button id="btnHangup" class="btn-hangup"><i class="icon">✖</i></button>
      </div>

      <!-- Modal: Incoming -->
      <div id="incomingModal" class="incoming-modal">
        <div style="color: var(--royal-gold); letter-spacing: 4px; font-size: 11px; margin-bottom: 20px;">ROYAL CALL INCOMING</div>
        <div id="incomingCaller" class="incoming-caller">Unknown</div>
        <div class="incoming-actions">
          <button id="btnReject" class="btn-inc btn-rej"><i class="icon">✖</i></button>
          <button id="btnAnswerAudio" class="btn-inc btn-ans"><i class="icon">📞</i></button>
          <button id="btnAnswerVideo" class="btn-inc btn-ans" style="background: var(--royal-gold);"><i class="icon">📹</i></button>
        </div>
      </div>

    </div>

    <audio id="remoteAudio" autoplay></audio>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.appendDial = (val) => {
        const display = document.getElementById('dialpadDisplay');
        if (display.innerText.length < 15) {
          display.innerText += val;
          const btn = document.getElementById(`key-${val === '*' ? 'star' : val === '#' ? 'hash' : val}`);
          if (btn) {
            btn.classList.add('kbd-active');
            setTimeout(() => btn.classList.remove('kbd-active'), 100);
          }
        }
      };
      window.backspaceDial = () => {
        const display = document.getElementById('dialpadDisplay');
        display.innerText = display.innerText.slice(0, -1);
      };
      window.joinConference = () => {
        document.getElementById('dialpadDisplay').innerText = '8000'; // Default Asterisk ConfBridge
      };
    </script>
  </body>
</html>
